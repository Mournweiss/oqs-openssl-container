# oqs-openssl-container: Publish to GHCR
#
# This workflow publishes OQS-OpenSSL images to GitHub Container Registry (GHCR).
# Triggered on tag pushes (v*) or manually via workflow_dispatch.

name: Publish to GHCR

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            base:
                description: "Base OS to build"
                required: true
                default: "all"
                type: choice
                options:
                    - alpine
                    - debian-bookworm
                    - all

env:
    REGISTRY: ghcr.io
    IMAGE_ALPINE: mournweiss/oqs-openssl-alpine
    IMAGE_BOOKWORM: mournweiss/oqs-openssl-bookworm

jobs:
    publish-alpine:
        name: Build and Publish Alpine
        if: >
            github.event_name == 'push' ||
            github.event.inputs.base == 'all' ||
            github.event.inputs.base == 'alpine'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              continue-on-error: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              continue-on-error: false

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
              continue-on-error: false

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_ALPINE }}
                  tags: |
                      type=ref,event=tag
                      type=raw,value=alpine-latest
                      type=sha,prefix=alpine-
              continue-on-error: false

            - name: Build and push Alpine image
              uses: docker/build-push-action@v6
              continue-on-error: false
              with:
                  context: .
                  file: containerfiles/alpine/Containerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    publish-bookworm:
        name: Build and Publish Bookworm
        if: >
            github.event_name == 'push' ||
            github.event.inputs.base == 'all' ||
            github.event.inputs.base == 'debian-bookworm'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              continue-on-error: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              continue-on-error: false

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
              continue-on-error: false

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_BOOKWORM }}
                  tags: |
                      type=ref,event=tag
                      type=raw,value=bookworm-latest
                      type=sha,prefix=bookworm-
              continue-on-error: false

            - name: Build and push Bookworm image
              uses: docker/build-push-action@v6
              continue-on-error: false
              with:
                  context: .
                  file: containerfiles/debian-bookworm/Containerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
