# oqs-openssl-container: CI Build and Test
#
# This workflow builds and tests OQS-OpenSSL images on push to main branch.

name: Build and Test

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}/oqs-openssl

jobs:
    build-alpine:
        name: Build and Test Alpine
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              continue-on-error: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              continue-on-error: false

            - name: Build Alpine image
              uses: docker/build-push-action@v6
              continue-on-error: false
              with:
                  context: .
                  file: containerfiles/alpine/Containerfile
                  push: false
                  load: true
                  tags: oqs-openssl:alpine-latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Test Alpine image
              run: |
                  ./scripts/test.sh --image oqs-openssl:alpine-latest
              continue-on-error: false

    build-bookworm:
        name: Build and Test Bookworm
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              continue-on-error: false

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              continue-on-error: false

            - name: Build Bookworm image
              uses: docker/build-push-action@v6
              continue-on-error: false
              with:
                  context: .
                  file: containerfiles/debian-bookworm/Containerfile
                  push: false
                  load: true
                  tags: oqs-openssl:bookworm-latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Test Bookworm image
              run: |
                  ./scripts/test.sh --image oqs-openssl:bookworm-latest
              continue-on-error: false
